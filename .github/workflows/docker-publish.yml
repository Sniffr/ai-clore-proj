name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Build llama.cpp server-cuda from upstream with CUDA 12.4
  # Uses the official cuda.Dockerfile with --build-arg overrides.
  # Runs on any host with NVIDIA driver ≥ 525 / CUDA ≥ 12.4.
  #
  # KEY FIX: NVIDIA only published CUDA 12.4 images for Ubuntu 22.04,
  # not 24.04, so we must set UBUNTU_VERSION=22.04 alongside CUDA_VERSION.
  # ────────────────────────────────────────────────────────────────
  build-cuda-12-4:
    name: Build server-cuda (CUDA 12.4)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          echo "LLAMA_SHA=$(git -C llama.cpp rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server-cuda (CUDA 12.4)
        uses: docker/build-push-action@v6
        with:
          context: ./llama.cpp
          file: ./llama.cpp/.devops/cuda.Dockerfile
          target: server
          build-args: |
            CUDA_VERSION=12.4.0
            UBUNTU_VERSION=22.04
            CUDA_DOCKER_ARCH=all
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:server-cuda-12-4
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:server-cuda-12-4-${{ env.LLAMA_SHA }}

  # ────────────────────────────────────────────────────────────────
  # Existing jobs (unchanged)
  # ────────────────────────────────────────────────────────────────

  # Fast build (~5 min): pre-built llama.cpp binary pinned to b8672 (CUDA 12.4 compatible)
  build-cpp:
    name: Build server-cuda image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server-cuda
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-cpp
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:server-cuda
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:server-cuda-latest

  # Slow build (~90 min): compiled from source against CUDA 12.4 — runs on any driver 550+
  build-universal:
    name: Build universal image (from source)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push universal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:server-cuda-universal
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:server-cuda-universal-latest