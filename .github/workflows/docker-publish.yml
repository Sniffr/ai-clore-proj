name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # Fast build (~5 min): pre-built llama.cpp binary pinned to b8672 (CUDA 12.4 compatible)
  build-cpp:
    name: Build server-cuda image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server-cuda
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-cpp
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:server-cuda
  # ────────────────────────────────────────────────────────────────
  # vLLM image — wraps the official vllm/vllm-openai base with the
  # Flask model manager + Clore startup scripts. Tagged :vllm.
  # ────────────────────────────────────────────────────────────────
  build-vllm:
    name: Build vLLM image
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vLLM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-vllm
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:vllm
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:vllm-${{ env.SHORT_SHA }}


  # Fast build (~5 min): pre-built llama.cpp binary pinned to b8672 (CUDA 12.4 compatible)
  build-cpp-no:
    name: Build image no Model
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server-cuda
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-cpp-no-model
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp:model